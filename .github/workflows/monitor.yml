name: 股价监控定时任务

on:
  schedule:
    # 交易时段每小时运行一次（UTC时间，北京时间=UTC+8）
    # A股: 9:30-15:00 → UTC 1:30-7:00
    - cron: "0 1-7 * * 1-5"
  workflow_dispatch:  # 允许手动触发测试

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行监控脚本
        run: python monitor.py
