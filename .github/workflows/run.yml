name: Fund Monitor Bot
on:
  schedule:
    - cron: "30 6 * * 1-5" # 周一到周五14:30运行
  workflow_dispatch: # 允许手动触发测试

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # 强制使用3.11，绝对不能写3.9
          cache: "pip"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --no-cache-dir # 强制清除缓存重新安装

      - name: 运行监控脚本
        run: python -u monitor.py
